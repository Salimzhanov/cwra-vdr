name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"

    - name: Lint
      run: ruff check cwra/ cwra.py pu_conformal.py run_cwra.py --exit-zero

    - name: Smoke check (imports + CLI --help)
      run: python scripts/smoke_check.py

    - name: Run tests
      run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

    - name: Dry-run pipeline
      run: python run_cwra.py --dry-run